<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D BLOCK VIEWER</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}

.header{
width:100%;
background:#00cc44;
color:#fff;
text-align:center;
padding:15px;
font-weight:bold;
}

.container{
width:90%;
max-width:450px;
background:#fff;
padding:20px;
margin-top:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:#1e88e5;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

.history-item{
padding:8px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.history-item:hover{
background:#e0f7fa;
}

#topAccess div:hover{
background:#f5f5f5;
}

.counter{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.counter-box{
flex:1;
background:#fff;
margin:3px;
padding:8px;
text-align:center;
border-radius:6px;
box-shadow:0 0 4px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="header">3D BLOCK VIEWER</div>

<div style="text-align:center;margin-top:10px;">
<div id="greeting"></div>
<div id="currentDate"></div>
</div>

<div class="container">

<label>Nhập tàu</label>
<input id="shipInput" placeholder="S57606">

<label>Nhập Block</label>
<input id="blockInput" placeholder="E41P">

<button onclick="open3D()">BẮT ĐẦU</button>

<div style="margin-top:15px;cursor:pointer;color:#0077cc;" id="historyToggle">
📜 Lịch sử truy cập
</div>

<div id="historyList" style="display:none;background:#fff;border:1px solid #ccc;border-radius:6px;"></div>

<div id="topAccess" style="margin-top:8px;background:#fff;border:1px solid #ccc;border-radius:6px;padding:6px;"></div>

</div>

<div class="counter">

<div class="counter-box">ONLINE<br><span id="onlineCount">0</span></div>
<div class="counter-box">TODAY<br><span id="todayCount">0</span></div>
<div class="counter-box">TOTAL<br><span id="visitCount">0</span></div>

</div>

<script>
// ===== GREETING =====
function updateGreeting(){
let h=new Date().getHours();
let text="Xin chào";

if(h<12) text="Chào buổi sáng 🌞";
else if(h<18) text="Chào buổi chiều 🌤️";
else text="Chào buổi tối 🌙";

document.getElementById("greeting").innerText=text;

let d=new Date();
document.getElementById("currentDate").innerText=
`${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}
updateGreeting();

// ===== HISTORY =====
let accessHistory = JSON.parse(localStorage.getItem("accessHistory")) || [];

function addAccessHistory(ship,block){
let now=new Date();
let entry={
date:now.toLocaleDateString(),
time:now.toLocaleTimeString(),
ship,block
};

accessHistory = accessHistory.filter(e=>!(e.ship===ship && e.block===block));
accessHistory.unshift(entry);

if(accessHistory.length>30) accessHistory.pop();

localStorage.setItem("accessHistory",JSON.stringify(accessHistory));
renderHistory();
}

// ===== RENDER HISTORY =====
function renderHistory(){
let box=document.getElementById("historyList");
box.innerHTML="";

accessHistory.forEach(e=>{
let div=document.createElement("div");
div.className="history-item";
div.innerText=`${e.date} ${e.time} | ${e.ship} | ${e.block}`;

div.onclick=()=>open3DFromHistory(e.ship,e.block);

box.appendChild(div);
});

renderTopAccess();
}

// ===== TOP 3 =====
function renderTopAccess(){
let box=document.getElementById("topAccess");

if(accessHistory.length===0){
box.innerHTML="📊 Chưa có dữ liệu";
return;
}

let counter={};

accessHistory.forEach(e=>{
let key=e.ship+"|"+e.block;
counter[key]=(counter[key]||0)+1;
});

let sorted=Object.entries(counter)
.sort((a,b)=>b[1]-a[1])
.slice(0,3);

box.innerHTML="🔥 Truy cập nhiều nhất:<br>";

sorted.forEach((item,i)=>{
let [key,count]=item;
let [ship,block]=key.split("|");

let div=document.createElement("div");
div.innerHTML=`#${i+1} 🚢 ${ship} | 📦 ${block} (${count})`;

div.style.padding="6px";
div.style.cursor="pointer";

div.onclick=()=>open3DFromHistory(ship,block);

box.appendChild(div);
});
}

// ===== TOGGLE =====
document.getElementById("historyToggle").onclick=function(){
let box=document.getElementById("historyList");
box.style.display = box.style.display==="none"?"block":"none";
};

// ===== OPEN =====
function open3D(){
let ship=document.getElementById("shipInput").value.trim();
let block=document.getElementById("blockInput").value.trim();

if(ship.length!==6){alert("Sai mã tàu");return;}
if(block===""){alert("Nhập block");return;}

addAccessHistory(ship,block);

window.location.href=
"https://mobile3d.hmd.co.kr:8087/VIZWide3D/OutfitMobile3dhttps.html?ship="+ship+"&block="+block;
}

function open3DFromHistory(ship,block){
window.location.href=
"https://mobile3d.hmd.co.kr:8087/VIZWide3D/OutfitMobile3dhttps.html?ship="+ship+"&block="+block;
}

renderHistory();
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue, set, onDisconnect }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyCUeBoM",
databaseURL:"https://block3d-232d2-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db=getDatabase(app);

// TOTAL
const visitRef=ref(db,"visits");
runTransaction(visitRef,c=>(c||0)+1);
onValue(visitRef,s=>document.getElementById("visitCount").innerText=s.val()||0);

// TODAY
let d=new Date();
let key=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
const todayRef=ref(db,"daily/"+key);
runTransaction(todayRef,c=>(c||0)+1);
onValue(todayRef,s=>document.getElementById("todayCount").innerText=s.val()||0);

// ONLINE
const userRef=ref(db,"online/"+Date.now());
set(userRef,true);
onDisconnect(userRef).remove();

onValue(ref(db,"online"),s=>{
document.getElementById("onlineCount").innerText=s.size||0;
});
</script>

</body>
</html>
